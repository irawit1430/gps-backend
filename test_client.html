<!DOCTYPE html>
<html>
<head>
    <title>Live GPS Simulation Test</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background: #0f172a; color: #f8fafc; }
        h1 { color: #38bdf8; text-align: center; margin-bottom: 30px; }
        #buses { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .bus { 
            background: #1e293b; 
            padding: 20px; 
            border-radius: 12px; 
            border-left: 6px solid #10b981; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: transform 0.2s;
        }
        .bus:hover { transform: translateY(-2px); }
        .plate { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; color: #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .pulse { height: 10px; width: 10px; background-color: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #10b981; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .detail { color: #94a3b8; font-size: 0.9em; margin: 5px 0; }
        .val { color: #e2e8f0; font-weight: 500; }
    </style>
</head>
<body>
    <h1>🛰️ Real-time Fleet Simulator</h1>
    <div id="buses"><h3 style="text-align: center; width: 100%; color: #64748b;">Waiting for simulation data... Start 'node simulate.js'</h3></div>

    <script>
        const socket = io('http://localhost:3000');
        const buses = {};

        socket.on('connect', () => {
            console.log('Connected to WebSocket Server');
        });

        socket.on('location_update', (data) => {
            buses[data.busId] = data;
            render();
        });

        function render() {
            const container = document.getElementById('buses');
            container.innerHTML = '';
            
            Object.values(buses).forEach(bus => {
                const div = document.createElement('div');
                div.className = 'bus';
                div.innerHTML = `
                    <div class="plate">
                        <span>🚌 ${bus.licensePlate}</span>
                        <span class="pulse"></span>
                    </div>
                    <div class="detail">Speed: <span class="val">${bus.speed.toFixed(1)} km/h</span></div>
                    <div class="detail">Lat: <span class="val">${bus.lat.toFixed(5)}</span></div>
                    <div class="detail">Lng: <span class="val">${bus.lng.toFixed(5)}</span></div>
                    <div class="detail" style="margin-top: 15px; font-size: 0.8em; color: #64748b;">
                        Last Ping: ${new Date(bus.timestamp).toLocaleTimeString()}
                    </div>
                `;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
